  <!-- ═══ Preloader styles — inline so they load before React ═══ -->
  <style>
    #preloader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #08060A;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center
    }

    #preloader.exit {
      animation: plExit .7s ease forwards
    }

    @keyframes plExit {
      to {
        opacity: 0;
        transform: scale(1.04)
      }
    }

    .pl-bar-top,
    .pl-bar-bottom {
      position: absolute;
      left: 0;
      right: 0;
      display: flex
    }

    .pl-bar-top {
      top: 0;
      height: 4px
    }

    .pl-bar-bottom {
      bottom: 0;
      height: 3px;
      opacity: .4
    }

    .pl-bar-top span:nth-child(1),
    .pl-bar-bottom span:nth-child(1) {
      flex: 1;
      background: #C8180A
    }

    .pl-bar-top span:nth-child(2),
    .pl-bar-bottom span:nth-child(2) {
      flex: 1;
      background: #F5A800
    }

    .pl-bar-top span:nth-child(3),
    .pl-bar-bottom span:nth-child(3) {
      flex: 1;
      background: #E02010
    }

    .pl-bg-glow {
      position: absolute;
      width: 560px;
      height: 560px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245, 168, 0, .10) 0%, rgba(200, 24, 10, .05) 45%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: plBreathe 4s ease-in-out infinite;
      pointer-events: none
    }

    @keyframes plBreathe {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: .8
      }

      50% {
        transform: translate(-50%, -50%) scale(1.15);
        opacity: 1
      }
    }

    .pl-grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255, 255, 255, .018) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .018) 1px, transparent 1px);
      background-size: 44px 44px;
      animation: plGridFade 1s .2s ease both;
      pointer-events: none
    }

    @keyframes plGridFade {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .pl-scan {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      top: -2px;
      background: linear-gradient(90deg, transparent, rgba(245, 168, 0, .3), transparent);
      animation: plScan 3s .5s ease-in-out infinite;
      pointer-events: none
    }

    @keyframes plScan {
      0% {
        top: -2px
      }

      100% {
        top: 100vh
      }
    }

    #pl-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1
    }

    .pl-particle {
      position: absolute;
      border-radius: 50%;
      animation: plRise linear infinite
    }

    @keyframes plRise {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0
      }

      8% {
        opacity: 1
      }

      92% {
        opacity: .4
      }

      100% {
        transform: translateY(-110vh) translateX(var(--dx));
        opacity: 0
      }
    }

    .pl-stage {
      position: relative;
      z-index: 5;
      width: min(440px, 90vw);
      height: 220px;
      overflow: visible
    }

    .pl-word-old,
    .pl-word-new {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center
    }

    .pl-word-old {
      animation: plWordOldIn .8s 0s ease both, plWordOldOut .6s 2.2s ease forwards
    }

    @keyframes plWordOldIn {
      from {
        opacity: 0;
        transform: translateY(calc(-50% + 30px))
      }

      to {
        opacity: 1;
        transform: translateY(-50%)
      }
    }

    @keyframes plWordOldOut {
      to {
        opacity: 0;
        transform: translateY(calc(-50% - 40px));
        filter: blur(4px)
      }
    }

    .pl-old-label {
      font-family: 'Mukta', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .30);
      border: 1px solid rgba(255, 255, 255, .12);
      padding: 3px 14px;
      border-radius: 20px;
      margin-bottom: 10px
    }

    .pl-old-word {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(42px, 9vw, 82px);
      font-weight: 900;
      letter-spacing: 3px;
      line-height: 1;
      background: linear-gradient(135deg, #E02010, #F5A800, #FFCB00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative
    }

    .pl-old-word::after {
      content: '';
      position: absolute;
      left: -4%;
      top: 50%;
      width: 0%;
      height: 3px;
      background: linear-gradient(90deg, #C8180A, #E02010);
      box-shadow: 0 0 10px rgba(200, 24, 10, .7);
      animation: plStrike .7s 1.0s ease forwards
    }

    @keyframes plStrike {
      from {
        width: 0%
      }

      to {
        width: 108%
      }
    }

    .pl-old-kannada {
      font-family: 'Tiro Kannada', serif;
      font-size: clamp(14px, 2.5vw, 22px);
      background: linear-gradient(135deg, #E02010, #F5A800, #FFCB00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 4px;
      margin-top: 5px;
      animation: plFadeSlideUp .6s 0.8s ease both
    }

    .pl-word-new {
      animation: plWordNewIn .9s 3.0s cubic-bezier(.34, 1.56, .64, 1) both
    }

    @keyframes plWordNewIn {
      from {
        opacity: 0;
        transform: translateY(calc(-50% + 50px)) scale(.8);
        filter: blur(8px)
      }

      to {
        opacity: 1;
        transform: translateY(-50%) scale(1);
        filter: blur(0)
      }
    }

    .pl-new-label {
      font-family: 'Mukta', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(90deg, #C8180A, #F5A800);
      padding: 3px 14px;
      border-radius: 20px;
      margin-bottom: 10px
    }

    .pl-the-real {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(22px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #E02010, #F5A800, #FFCB00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: plFadeSlideUp .6s 3.2s ease both
    }

    .pl-new-word {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(42px, 9vw, 82px);
      font-weight: 900;
      letter-spacing: 3px;
      line-height: 1.3;
      padding-bottom: 8px;
      background: linear-gradient(135deg, #E02010, #F5A800, #FFCB00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: plGlowPulse 3s 3.9s ease-in-out infinite
    }

    @keyframes plGlowPulse {

      0%,
      100% {
        filter: drop-shadow(0 0 10px rgba(245, 168, 0, .3))
      }

      50% {
        filter: drop-shadow(0 0 24px rgba(245, 168, 0, .7)) drop-shadow(0 0 48px rgba(200, 24, 10, .3))
      }
    }

    .pl-new-prefix {
      font-family: 'Baloo 2', 'Tiro Kannada', cursive, serif;
      font-size: clamp(16px, 3vw, 28px);
      font-weight: 800;
      background: linear-gradient(135deg, #E02010, #F5A800, #FFCB00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
      margin-bottom: -4px;
      animation: plFadeSlideUp .5s 3.2s ease both
    }

    .pl-new-kannada {
      font-family: 'Tiro Kannada', serif;
      font-size: clamp(14px, 2.5vw, 22px);
      background: linear-gradient(135deg, #E02010, #F5A800, #FFCB00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 4px;
      margin-top: 5px;
      animation: plFadeSlideUp .6s 3.7s ease both
    }

    .pl-tagline-wrap {
      position: absolute;
      bottom: -78px;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: plFadeSlideUp .7s 3.9s ease both
    }

    @keyframes plFadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .pl-tagline-divider {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .pl-div-line-l {
      width: 48px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #C8180A)
    }

    .pl-div-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #C8180A, #F5A800);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      box-shadow: 0 0 10px rgba(245, 168, 0, .4)
    }

    .pl-div-line-r {
      width: 48px;
      height: 1.5px;
      background: linear-gradient(90deg, #F5A800, transparent)
    }

    .pl-art-row {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .pl-art-pill {
      display: flex;
      align-items: baseline;
      gap: 3px
    }

    .pl-art-letter {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 900;
      background: linear-gradient(135deg, #E02010, #F5A800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .pl-art-word {
      font-family: 'Mukta', sans-serif;
      font-size: clamp(8px, 1.2vw, 11px);
      font-weight: 600;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #E02010, #F5A800, #FFCB00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase
    }

    .pl-art-sep {
      color: rgba(245, 168, 0, .4);
      font-size: 20px;
      line-height: 1
    }

    .pl-progress-wrap {
      position: absolute;
      bottom: 34px;
      left: 50%;
      transform: translateX(-50%);
      width: min(320px, 80vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      z-index: 5
    }

    .pl-progress-track {
      width: 100%;
      height: 2.5px;
      background: rgba(255, 255, 255, .08);
      border-radius: 2px;
      overflow: hidden
    }

    .pl-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #C8180A, #F5A800, #FFCB00);
      border-radius: 2px;
      box-shadow: 0 0 10px rgba(245, 168, 0, .5);
      animation: plProgressFill 4.6s .4s cubic-bezier(.4, 0, .2, 1) forwards
    }

    @keyframes plProgressFill {
      0% {
        width: 0%
      }

      30% {
        width: 25%
      }

      55% {
        width: 50%
      }

      72% {
        width: 70%
      }

      100% {
        width: 100%
      }
    }

    .pl-progress-label {
      font-family: 'Mukta', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .20)
    }

    .pl-progress-label::after {
      content: '';
      display: inline-block;
      width: 18px;
      text-align: left;
      animation: plDots 2s steps(7, end) infinite
    }

    @keyframes plDots {
      0% {
        content: ''
      }

      14% {
        content: '.'
      }

      28% {
        content: '..'
      }

      42% {
        content: '...'
      }

      57% {
        content: '..'
      }

      71% {
        content: '.'
      }

      85%,
      100% {
        content: ''
      }
    }

    .pl-logo-wrap {
      position: relative;
      z-index: 5;
      width: 168px;
      height: 168px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      animation: plLogoIn .9s .1s cubic-bezier(.34, 1.56, .64, 1) both
    }

    .pl-logo-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(#E02010 0deg 120deg, #FF7A00 120deg 240deg, #FFCB00 240deg 360deg);
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
      animation: plLogoSpin 4.8s linear infinite;
      box-shadow: 0 0 18px rgba(245, 168, 0, .22)
    }

    .pl-logo-inner {
      position: relative;
      width: 94px;
      height: 94px;
      border-radius: 20px;
      background: #0A0808;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .45)
    }

    .pl-logo-img {
      width: 86px;
      height: 86px;
      border-radius: 16px;
      object-fit: contain;
      display: block
    }

    @keyframes plLogoIn {
      from {
        opacity: 0;
        transform: scale(.5);
        filter: blur(8px)
      }

      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0)
      }
    }

    @keyframes plLogoSpin {
      from {
        rotate: 0deg
      }

      to {
        rotate: 360deg
      }
    }
  </style>
  <!-- ═══ Path-based Preloader Toggle ═══ -->
  <style id="preloader-hide-style">
    #preloader { display: none !important; }
  </style>
  <script>
    (function () {
      var path = window.location.pathname;
      // Show preloader only on root or explicit loading page
      if (path === '/' || path === '/index.html' || path === '/loading') {
        var style = document.getElementById('preloader-hide-style');
        if (style) style.remove();
      }
    })();
  </script>
