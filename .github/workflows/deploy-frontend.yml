# Auto-deploy the frontend to S3 + CloudFront on every push to main.
# Auth is keyless via GitHub OIDC (assumes an IAM role — no AWS keys stored).

name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch: {}        # lets you trigger manually from the Actions tab

concurrency:                   # never let two deploys race
  group: deploy-frontend
  cancel-in-progress: true

permissions:
  id-token: write              # required for OIDC
  contents: read

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: prajaakeeya-frontend
  CLOUDFRONT_DISTRIBUTION_ID: E4MRGE3YYYD1J

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # No 'cache:' here — there is no committed package-lock.json to key on.
          # (If you later commit package-lock.json, add `cache: npm` and switch
          #  the install step to `npm ci` for faster, reproducible builds.)

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_APP_MODE: ${{ vars.VITE_APP_MODE }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Configure AWS credentials (OIDC, keyless)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Hashed assets → cache hard for a year (filenames change every build).
      - name: Sync immutable assets
        run: |
          aws s3 sync dist/ s3://$S3_BUCKET/ \
            --delete \
            --exclude "index.html" \
            --exclude "sw.js" \
            --exclude "registerSW.js" \
            --exclude "manifest.webmanifest" \
            --cache-control "public,max-age=31536000,immutable"

      # Entry + service-worker files → never cache, so releases go live instantly.
      - name: Sync no-cache entry + service-worker files
        run: |
          aws s3 cp dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "no-cache,no-store,must-revalidate" --content-type "text/html"
          [ -f dist/sw.js ] && aws s3 cp dist/sw.js s3://$S3_BUCKET/sw.js \
            --cache-control "no-cache,no-store,must-revalidate" --content-type "application/javascript" || true
          [ -f dist/registerSW.js ] && aws s3 cp dist/registerSW.js s3://$S3_BUCKET/registerSW.js \
            --cache-control "no-cache,no-store,must-revalidate" --content-type "application/javascript" || true
          [ -f dist/manifest.webmanifest ] && aws s3 cp dist/manifest.webmanifest s3://$S3_BUCKET/manifest.webmanifest \
            --cache-control "no-cache" --content-type "application/manifest+json" || true

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/" "/index.html" "/sw.js" "/registerSW.js" "/manifest.webmanifest"
